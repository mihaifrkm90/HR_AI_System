<!DOCTYPE html>
<html>

<head>

<title>HR AI System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<script>

if(localStorage.getItem("logged") !== "true"){

    window.location="login.html";

}


const loginTime = localStorage.getItem("loginTime");

const durataSesiune = 60 * 60 * 1000;


if(
!loginTime ||
Date.now() - loginTime > durataSesiune
){

localStorage.clear();

window.location="login.html";

}

</script>



<div class="app-container">


<!-- SIDEBAR -->

<aside class="sidebar">


<h2>
HR AI
</h2>


<nav>


<button>
Dashboard
</button>


<button>
Candidates
</button>


<button>
AI Insights
</button>


<button>
Reports
</button>


<button>
Settings
</button>


</nav>


</aside>





<!-- MAIN AREA -->

<main class="main-content">



<header class="top-header">


<div>

<h1>
HR AI Talent Management System
</h1>


<p>
AI-powered employee evaluation, performance tracking and promotion prediction system.
</p>

</div>


<button onclick="logout()">
Logout
</button>


</header>





<!-- KPI CARDS -->


<section>


<div id="dashboard">

Loading statistics...

</div>


</section>






<!-- CHART -->


<section class="panel">


<h2>
Candidate Distribution
</h2>


<div class="chart-container">

<canvas id="nivelChart"></canvas>

</div>


</section>







<!-- SEARCH -->


<section class="panel">


<h2>
Candidates
</h2>



<div class="controale">


<select 
id="filtru"
onchange="filtreazaNivel()"
>


<option value="toate">
All Candidates
</option>


<option value="High Potential">
High Potential
</option>


<option value="Ready Soon">
Ready Soon
</option>


<option value="Developing">
Developing
</option>


<option value="Needs Improvement">
Needs Improvement
</option>


</select>




<input

id="cautare"

placeholder="Search candidate..."

onkeyup="cautaCandidat()"

>


</div>





<div id="lista">

Loading candidates...

</div>


</section>









<!-- ADD CANDIDATE -->


<section class="panel">


<h2>
Add New Candidate
</h2>



<div class="formular">


<input
id="nume"
placeholder="Candidate Name"
>


<input
id="experienta"
placeholder="Years of Experience"
>


<input
id="performanta"
placeholder="Performance (1-10)"
>


<input
id="certificari"
placeholder="Certifications"
>


<button onclick="adaugaCandidat()">

Add Candidate

</button>



</div>


</section>



</main>


</div>






<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="app.js"></script>


</body>

</html>

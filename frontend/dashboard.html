<!DOCTYPE html>
<html>

<head>

<title>HR System</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<script>

if(localStorage.getItem("logged") !== "true"){

    window.location="login.html";

}

</script>

<script>

const logged = localStorage.getItem("logged");

const loginTime = localStorage.getItem("loginTime");

const durataSesiune = 60 * 60 * 1000; 
// 1 hour

if(
logged !== "true" ||
!loginTime ||
Date.now() - loginTime > durataSesiune
){

localStorage.clear();

window.location="login.html";

}

</script>


<div class="header">

<h1>
HR AI Talent Management System
</h1>

<p>
AI-powered employee evaluation, performance tracking and promotion prediction system.
</p>

<button onclick="logout()">
Logout
</button>

</div>

<!-- Dashboard KPI -->

<div id="dashboard">

Loading statistics...

</div>


<!-- Candidate distribution chart -->

<h2>Candidate Level Distribution</h2>

<div class="chart-container">

<canvas id="nivelChart"></canvas>

</div>


<!-- Search and filter -->

<div class="controale">

<select id="filtru" onchange="filtreazaNivel()">

<option value="toate">
All Candidates
</option>

<option value="High Potential">
High Potential
</option>

<option value="Ready Soon">
Ready Soon
</option>

<option value="Developing">
Developing
</option>

<option value="Needs Improvement">
Needs Improvement
</option>

</select>


<input
id="cautare"
placeholder="Search candidate..."
onkeyup="cautaCandidat()"
>

</div>


<!-- Candidate list -->

<div id="lista">

Loading candidates...

</div>


<!-- Add candidate -->

<h2>Add Candidate</h2>

<div class="formular">

<input
id="nume"
placeholder="Candidate Name"
>

<input
id="experienta"
placeholder="Years of Experience"
>

<input
id="performanta"
placeholder="Performance (1-10)"
>

<input
id="certificari"
placeholder="Certifications"
>

<button onclick="adaugaCandidat()">

Add Candidate

</button>

</div>


<!-- Charts -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Application -->

<script src="app.js"></script>

</body>

</html>
